name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON=${{ secrets.VITE_SUPABASE_ANON }}" >> .env
          echo "VITE_TELEGRAM_BOT_TOKEN=${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}" >> .env
          echo "VITE_TELEGRAM_CHAT_ID=${{ secrets.VITE_TELEGRAM_CHAT_ID }}" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Lann Kyaung" "com.lannkyaung.app" --web-dir dist
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android
    # ── Copy app icons into Android project ──────────────────
      - name: Set app icons
        run: |
          RES=android/app/src/main/res
          
          # CRITICAL FIX: Remove modern Adaptive XML configurations 
          # This forces Android to fall back to your custom PNG assets!
          rm -rf $RES/mipmap-anydpi-v26
          
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $RES/mipmap-$density
            
            # Find the standard/square icon
            SRC_SQUARE=$(find android-icons/mipmap-$density -type f \( -name "*ic_launcher.png" -o -name "*launcher.png" -o -name "*icon.png" \) | head -n 1)
            if [ -n "$SRC_SQUARE" ]; then
              cp "$SRC_SQUARE" $RES/mipmap-$density/ic_launcher.png
            fi
            
            # Find the round icon
            SRC_ROUND=$(find android-icons/mipmap-$density -type f \( -name "*round*" -o -name "*circle*" \) | head -n 1)
            if [ -n "$SRC_ROUND" ]; then
              cp "$SRC_ROUND" $RES/mipmap-$density/ic_launcher_round.png
            else
              # Fallback: Use the square one if round is missing
              if [ -n "$SRC_SQUARE" ]; then
                cp "$SRC_SQUARE" $RES/mipmap-$density/ic_launcher_round.png
              fi
            fi
          done
          
          # Handle the foreground icon fallback structure safely
          mkdir -p $RES/mipmap-xxxhdpi
          SRC_FOREGROUND=$(find android-icons/mipmap-xxxhdpi -type f \( -name "*foreground*" -o -name "*fg*" \) | head -n 1)
          if [ -n "$SRC_FOREGROUND" ]; then
            cp "$SRC_FOREGROUND" $RES/mipmap-xxxhdpi/ic_launcher_foreground.png
          elif [ -f "$RES/mipmap-xxxhdpi/ic_launcher.png" ]; then
            cp $RES/mipmap-xxxhdpi/ic_launcher.png $RES/mipmap-xxxhdpi/ic_launcher_foreground.png
          fi
          
          echo "Modern anydpi overrides removed & PNG icons parsed successfully!"
      # ── Fix app label to "Lann Kyaung" ───────────────────────
      - name: Set app name
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          # Replace whatever app_name is set to with correct spelling
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Lann Kyaung</string>|g' $STRINGS
          echo "App name set:"
          grep app_name $STRINGS

      # ─────────────────────────────────────────────
      # 10. Add Android system permissions and link icons
      # ─────────────────────────────────────────────
      - name: Add Android permissions and link icons
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          
          # Inject all native system permissions directly inside the <manifest> tag on the fly
          grep -q "ACCESS_FINE_LOCATION" $MANIFEST || sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />' $MANIFEST
          
          # Explicitly force the application container to link against your custom android-icons
          sed -i 's|android:icon="[^"]*"|android:icon="@mipmap/ic_launcher"|g' $MANIFEST
          sed -i 's|android:roundIcon="[^"]*"|android:roundIcon="@mipmap/ic_launcher_round"|g' $MANIFEST
          
          echo "Native Android Manifest verified:"
          grep -E "uses-permission|icon" $MANIFEST
          
      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Generate keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore lann-kyaung.keystore \
            -alias lannkyaung \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "LannKyaungSecurePass123" \
            -keypass "LannKyaungSecurePass123" \
            -dname "CN=LannKyaung, OU=App, O=LannKyaung, L=Yangon, S=Yangon, C=MM"

      - name: Build Release APK
        working-directory: android
        run: |
          KEYSTORE_ABS="${{ github.workspace }}/android/app/lann-kyaung.keystore"
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_ABS" \
            -Pandroid.injected.signing.store.password="LannKyaungSecurePass123" \
            -Pandroid.injected.signing.key.alias="lannkyaung" \
            -Pandroid.injected.signing.key.password="LannKyaungSecurePass123"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lann-kyaung-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
