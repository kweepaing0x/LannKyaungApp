name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON=${{ secrets.VITE_SUPABASE_ANON }}" >> .env
          echo "VITE_TELEGRAM_BOT_TOKEN=${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}" >> .env
          echo "VITE_TELEGRAM_CHAT_ID=${{ secrets.VITE_TELEGRAM_CHAT_ID }}" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Lann Kyaung" "com.lannkyaung.app" --web-dir dist
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── Copy app icons into Android project ──────────────────
      - name: Set app icons
        run: |
          RES=android/app/src/main/res
          
          # CRITICAL FIX: Remove modern Adaptive XML configurations 
          # This forces Android to fall back to your custom PNG assets!
          rm -rf $RES/mipmap-anydpi-v26
          
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $RES/mipmap-$density
            
            # Find the standard/square icon
            SRC_SQUARE=$(find android-icons/mipmap-$density -type f \( -name "*ic_launcher.png" -o -name "*launcher.png" -o -name "*icon.png" \) | head -n 1)
            if [ -n "$SRC_SQUARE" ]; then
              cp "$SRC_SQUARE" $RES/mipmap-$density/ic_launcher.png
            fi
            
            # Find the round icon
            SRC_ROUND=$(find android-icons/mipmap-$density -type f \( -name "*round*" -o -name "*circle*" \) | head -n 1)
            if [ -n "$SRC_ROUND" ]; then
              cp "$SRC_ROUND" $RES/mipmap-$density/ic_launcher_round.png
            else
              # Fallback: Use the square one if round is missing
              if [ -n "$SRC_SQUARE" ]; then
                cp "$SRC_SQUARE" $RES/mipmap-$density/ic_launcher_round.png
              fi
            fi
          done
          
          # Handle the foreground icon fallback structure safely
          mkdir -p $RES/mipmap-xxxhdpi
          SRC_FOREGROUND=$(find android-icons/mipmap-xxxhdpi -type f \( -name "*foreground*" -o -name "*fg*" \) | head -n 1)
          if [ -n "$SRC_FOREGROUND" ]; then
            cp "$SRC_FOREGROUND" $RES/mipmap-xxxhdpi/ic_launcher_foreground.png
          elif [ -f "$RES/mipmap-xxxhdpi/ic_launcher.png" ]; then
            cp $RES/mipmap-xxxhdpi/ic_launcher.png $RES/mipmap-xxxhdpi/ic_launcher_foreground.png
          fi
          
          echo "Modern anydpi overrides removed & PNG icons parsed successfully!"

    # ── Fix app label and append AdMob string resource ───────
      - name: Set app name and string configs
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          
          # Replace whatever app_name is set to with correct spelling
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Lann Kyaung</string>|g' $STRINGS
          
          # Clean old injections if running multiple times to avoid duplicates
          sed -i '/name="admob_app_id"/d' $STRINGS
          
          # SAFETY TRICK: Strip out any accidental trailing spacing characters
          CLEANED_ID=$(echo "${{ secrets.ADMOB_APP_ID_ANDROID }}" | tr -d '\r' | xargs)
          
          # PERFECTED QUOTE INJECTION: Appends cleanly right before closing </resources> tag
          sed -i 's|</resources>|    <string name="admob_app_id">'${CLEANED_ID}'</string>\n</resources>|g' $STRINGS
          
          echo "Strings updated verification check:"
          cat $STRINGS
          
     # ── Configure Manifest: Permissions, Deep-Links & Fixed AdMob Metadata ──
      - name: Add Android permissions and link configurations
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          
          # 1. CLEAN UP DUPLICATE PERMISSIONS: Avoid double injection conflicts
          # Only add permissions if they don't already exist in the file
          for perm in "CAMERA" "READ_MEDIA_IMAGES" "READ_MEDIA_VIDEO" "ACCESS_FINE_LOCATION" "ACCESS_COARSE_LOCATION" "READ_EXTERNAL_STORAGE" "WRITE_EXTERNAL_STORAGE"; do
            if ! grep -q "android.permission.$perm" $MANIFEST; then
              if [ "$perm" = "READ_EXTERNAL_STORAGE" ]; then
                sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' $MANIFEST
              elif [ "$perm" = "WRITE_EXTERNAL_STORAGE" ]; then
                sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />' $MANIFEST
              else
                sed -i '/<manifest/a\    <uses-permission android:name="android.permission.'$perm'" />' $MANIFEST
              fi
            fi
          done
          
          # Force custom launcher icons
          sed -i 's|android:icon="[^"]*"|android:icon="@mipmap/ic_launcher"|g' $MANIFEST
          sed -i 's|android:roundIcon="[^"]*"|android:roundIcon="@mipmap/ic_launcher_round"|g' $MANIFEST
          
          # 2. ADD EXPORTED=TRUE & INTENT FILTER TO MAINACTIVITY
          # Scrub out old custom scheme filters to start clean
          sed -i '/lannkyaung/d' $MANIFEST
          
          # Force android:exported="true" directly onto the MainActivity declaration
          sed -i 's|android:name=".MainActivity"|android:name=".MainActivity" android:exported="true"|g' $MANIFEST
          
          # Construct and inject the custom protocol listener right behind the tag opening line
          INTENT_BLOCK='<intent-filter><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="lannkyaung" /></intent-filter>'
          sed -i "s|android:exported=\"true\"|android:exported=\"true\">\n            $INTENT_BLOCK|g" $MANIFEST
          
          # 3. ADMOB METADATA INJECTION
          sed -i '/com.google.android.gms.ads.APPLICATION_ID/d' $MANIFEST
          sed -i 's|</application>|        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="@string/admob_app_id"/>\n    </application>|g' $MANIFEST
          
          echo "=== VERIFYING NATIVE MANIFEST ==="
          cat $MANIFEST
          
      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Generate keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore lann-kyaung.keystore \
            -alias lannkyaung \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "LannKyaungSecurePass123" \
            -keypass "LannKyaungSecurePass123" \
            -dname "CN=LannKyaung, OU=App, O=LannKyaung, L=Yangon, S=Yangon, C=MM"

      - name: Build Release APK
        working-directory: android
        run: |
          KEYSTORE_ABS="${{ github.workspace }}/android/app/lann-kyaung.keystore"
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_ABS" \
            -Pandroid.injected.signing.store.password="LannKyaungSecurePass123" \
            -Pandroid.injected.signing.key.alias="lannkyaung" \
            -Pandroid.injected.signing.key.password="LannKyaungSecurePass123"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lann-kyaung-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
