name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON=${{ secrets.VITE_SUPABASE_ANON }}" >> .env
          echo "VITE_TELEGRAM_BOT_TOKEN=${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}" >> .env
          echo "VITE_TELEGRAM_CHAT_ID=${{ secrets.VITE_TELEGRAM_CHAT_ID }}" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Lann Kyaing" "com.lannkyaung.app" --web-dir dist
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Add Android permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q "ACCESS_FINE_LOCATION" $MANIFEST || \
          sed -i 's|<manifest|<manifest|;/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' $MANIFEST

      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Generate keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore lann-kyaung.keystore \
            -alias lannkyaung \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "LannKyaungSecurePass123" \
            -keypass "LannKyaungSecurePass123" \
            -dname "CN=LannKyaung, OU=App, O=LannKyaung, L=Yangon, S=Yangon, C=MM"
          echo "Keystore created at: $PWD/lann-kyaung.keystore"
          ls -la lann-kyaung.keystore

      - name: Build Release APK
        working-directory: android
        run: |
          KEYSTORE_ABS="${{ github.workspace }}/android/app/lann-kyaung.keystore"
          echo "Using keystore: $KEYSTORE_ABS"
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_ABS" \
            -Pandroid.injected.signing.store.password="LannKyaungSecurePass123" \
            -Pandroid.injected.signing.key.alias="lannkyaung" \
            -Pandroid.injected.signing.key.password="LannKyaungSecurePass123"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lann-kyaung-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
